<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Login</title>
  <link rel="stylesheet" href="Css/login.css" />
</head>

<body>

  <div class="login-container">
    <img src="img/passaroKao.png" alt="Logo KaoArt" class="logo-login" id="passarinho" />
    <h1>Login</h1>
    <form id="loginForm" action="validar_user.php" method="POST">
      <div class="input-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required />
      </div>

      <button type="submit">Entrar</button>
      <p id="message"></p>
    </form>
  </div>
  <script>
    const passarinho = document.getElementById('passarinho');

    passarinho.addEventListener('dblclick', () => {

      window.location.href = 'login_adm.html';
    });
  </script>

</body>

</html>
